version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --legacy-peer-deps
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
        - test -f amplify_outputs.json || (echo "amplify_outputs.json missing — backend deploy must run first" && exit 1)
        - cp amplify_outputs.json src/amplify_outputs.json
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
